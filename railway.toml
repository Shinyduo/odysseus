# Railway config for Odysseus (self-hosted AI workspace).
# Builds the upstream Dockerfile; the app listens on PORT (default 7000).
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# The image CMD already runs uvicorn on :7000; PORT is pinned to 7000 in
# [variables] so Railway's proxy targets the same port. No startCommand needed
# (Railway would pass it as literal argv through the gosu entrypoint, so a
# ${PORT} placeholder there is never shell-expanded).
# Liveness endpoint, allow-listed past auth in app.py.
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
# SQLite DB, sessions, auth, uploads, skills and caches all live under /app/data.
requiredMountPath = "/app/data"

[variables]
PORT = "7000"
